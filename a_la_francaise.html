<!DOCTYPE html>
<html lang="fr">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>ohmyfood</title>
    <link rel="stylesheet" type="text/css" href="restaurants_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Shrikhand&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wdth@1,96.6&family=Shrikhand&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="loader">
      <p>ohmyfood</p>
   </div>

    <header id="top">
        <nav>
            <a href="homepage.html" class="fleche"><i class="fa-solid fa-arrow-left"></i></a>
            <a href="#top"><img src="images/logo/ohmyfood.png" alt="Logo ohmyfood" class="logo"></a>
            <span class="empty"></span>
        </nav>
        <img src="images/restaurants/toa-heftiba-DQKerTsQwi0-unsplash.jpg" alt="Photo de plat"
            class="photo-presentation">
    </header>

    <main class="main-container">
        <div class="title">
            <h1>À la française</h1>
            <label class="heart-label">
                <i class="fa-regular fa-heart heart-vide"></i>
                <i class="fa-solid fa-heart heart-full"></i>
            </label>
        </div>

        <section class="menu">
            <h2 class="etapes">ENTRÉES</h2>
            <div class="plats-container">
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Tartare de poulpe acidulé</span>
                        <span class="plat-content">
                            <span class="plat-description">Aux zestes d'orange</span>
                            <span class="plat-prix"><strong>25€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Velouté de légumes d'antan</span>
                        <span class="plat-content">
                            <span class="plat-description">Carotte, panais, topinambour</span>
                            <span class="plat-prix"><strong>35€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Soupe à l'oignon</span>
                        <span class="plat-content">
                            <span class="plat-description">Revisitée</span>
                            <span class="plat-prix"><strong>20€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
            </div>
        </section>

        <section class="menu">
            <h2 class="etapes">PLATS</h2>
            <div class="plats-container">
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Coquilles Saint-Jacques</span>
                        <span class="plat-content">
                            <span class="plat-description">Accompagnées d'une purée de panais</span>
                            <span class="plat-prix"><strong>40€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Magret de canard</span>
                        <span class="plat-content">
                            <span class="plat-description">Et parmentier de pommes de terre</span>
                            <span class="plat-prix"><strong>35€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Pigeonneau d'Ille-et-Vilaine</span>
                        <span class="plat-content">
                            <span class="plat-description">Sur son lit de gnocchis aux légumes</span>
                            <span class="plat-prix"><strong>44€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
            </div>
        </section>

        <section class="menu">
            <h2 class="etapes">DESSERTS</h2>
            <div class="plats-container">
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Pétales de violettes glacés</span>
                        <span class="plat-content">
                            <span class="plat-description">Et purée de noisettes</span>
                            <span class="plat-prix"><strong>18€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Fondant au chocolat</span>
                        <span class="plat-content">
                            <span class="plat-description">Revisité</span>
                            <span class="plat-prix"><strong>22€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
                <button class="plats">
                    <span class="plat-full">
                        <span class="plat-title">Millefeuille croustillant</span>
                        <span class="plat-content">
                            <span class="plat-description">Myrtilles et pâte d'amande</span>
                            <span class="plat-prix"><strong>23€</strong></span>
                        </span>
                    </span>
                    <span class="check"><i class="fa-solid fa-circle-check"></i></span>
                </button>
            </div>
        </section>

        <button class="commander">Commander</button>
    </main>

    <footer>
        <h2>ohmyfood</h2>
        <div class="link-contener">
            <ul class="list-link">
                <li class="liens">
                    <a href="#">
                        <i class="fa-solid fa-utensils"></i>
                        <p>Proposer un restaurant</p>
                    </a>
                </li>
                <li class="liens">
                    <a href="#">
                        <i class="fa-solid fa-handshake-angle"></i>
                        <p>Devenir partenaire</p>
                    </a>
                </li>
            </ul>
            <ul class="list-link">
                <li class="liens">
                    <a href="#">Mentions légales</a>
                </li>
                <li class="liens">
                    <a href="mailto:contact@ohmyfood.com">Contact</a>
                </li>
            </ul>
        </div>
    </footer>

</body>

</html>
